<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Manager | Supabase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #3b82f6;
            --accent-secondary: #10b981;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 1rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-row {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        input {
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        button.btn {
            background: linear-gradient(135deg, var(--accent-primary) 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button.btn:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        button.btn:active {
            transform: translateY(0);
        }

        .bookmarks-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .bookmark-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .bookmark-item:hover {
            transform: translateX(4px);
            border-color: #475569;
        }

        .bookmark-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            max-width: 80%;
        }

        .bookmark-title {
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.2s ease;
        }

        .bookmark-title:hover {
            color: var(--accent-primary);
        }

        .bookmark-url {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        .btn-delete {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 6px;
            transition: color 0.2s ease, background-color 0.2s ease;
        }

        .btn-delete:hover {
            color: var(--danger);
            background-color: rgba(239, 68, 68, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
            border: 2px dashed var(--border-color);
            border-radius: 16px;
        }

        .empty-state p {
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--accent-secondary);
            align-self: flex-start;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>KeepSpace</h1>
            <p>Tus marcadores rápidos persistidos con Supabase</p>
        </header>

        <section class="card">
            <form action="/bookmarks" method="POST" class="form-group">
                <div class="input-row">
                    <label for="title">Título del Marcador</label>
                    <input type="text" id="title" name="title" placeholder="Ej. Supabase Docs" required>
                </div>
                <div class="input-row">
                    <label for="url">Enlace (URL)</label>
                    <input type="text" id="url" name="url" placeholder="Ej. https://supabase.com" required>
                </div>
                <button type="submit" class="btn">Guardar Marcador</button>
            </form>
        </section>

        <section class="bookmarks-list">
            {% if bookmarks %}
                {% for bookmark in bookmarks %}
                    <div class="bookmark-item">
                        <div class="bookmark-info">
                            <a href="{{ bookmark.url }}" target="_blank" rel="noopener noreferrer" class="bookmark-title">
                                {{ bookmark.title }}
                            </a>
                            <span class="bookmark-url">{{ bookmark.url }}</span>
                        </div>
                        <form action="/bookmarks/delete/{{ bookmark.id }}" method="POST" style="display: inline;">
                            <button type="submit" class="btn-delete" title="Eliminar marcador">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    <line x1="10" y1="11" x2="10" y2="17"></line>
                                    <line x1="14" y1="11" x2="14" y2="17"></line>
                                </svg>
                            </button>
                        </form>
                    </div>
                {% endfor %}
            {% else %}
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-secondary); margin-bottom: 1rem;">
                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <h3>No hay marcadores aún</h3>
                    <p>Agrega tu primer enlace usando el formulario de arriba.</p>
                </div>
            {% endif %}
        </section>
    </div>
</body>
</html>
