<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeepSpace | Marcadores con Supabase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>KeepSpace</h1>
            <p>Tus marcadores rápidos persistidos con Supabase</p>
        </header>

        <section class="card">
            <form id="bookmark-form" class="form-group">
                <div class="input-row">
                    <label for="title">Título del Marcador</label>
                    <input type="text" id="title" placeholder="Ej. Supabase Docs" required>
                </div>
                <div class="input-row">
                    <label for="url">Enlace (URL)</label>
                    <input type="text" id="url" placeholder="Ej. https://supabase.com" required>
                </div>
                <button type="submit" class="btn" id="submit-btn">Guardar Marcador</button>
            </form>
        </section>

        <section class="bookmarks-container">
            <div id="loading" class="status-msg">Cargando marcadores...</div>
            <div id="bookmarks-list" class="bookmarks-list" style="display: none;"></div>
            <div id="empty-state" class="empty-state" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-secondary); margin-bottom: 1rem;">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>
                <h3>No hay marcadores aún</h3>
                <p>Agrega tu primer enlace usando el formulario de arriba.</p>
            </div>
        </section>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
